<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>استخراج النص من الصور | WebBag</title>

<meta name="description" content="استخرج النصوص من الصور مجانًا باستخدام تقنية OCR مع دعم اللغة العربية والإنجليزية.">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<div class="container">

<div class="card">

<h1>استخراج النص من الصور</h1>

<p class="subtitle">
استخرج النصوص من الصور بدقة عالية باستخدام تقنية OCR، مع دعم العربية والإنجليزية.
</p>

<input
type="file"
id="imageInput"
accept="image/*"

>

<div id="preview">

<p class="placeholder">

اختر صورة لعرضها هنا

</p>

</div>

<button id="extractBtn">

استخراج النص

</button>

<div id="loading" class="loading">

جارٍ استخراج النص...

</div>

<textarea
id="result"
placeholder="سيظهر النص هنا..."
readonly
></textarea>

<div class="buttons">

<button id="copyBtn">

نسخ النص

</button>

<button id="downloadBtn">

تنزيل TXT

</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
